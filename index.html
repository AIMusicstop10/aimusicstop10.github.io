  <h2 style="color:white;text-align:center;">
Now Playing
</h2>
<h3 id="songTitle" style="color:white;text-align:center;">
Loading Song...
</h3>
<audio id="player" controls style="width:100%;"></audio>

<br><br>

<button onclick="prevSong()">⏮ Previous</button>
<button onclick="nextSong()">⏭ Next</button>

<script>

const songs = [
"2026a.mp3",
"alovebb.mp3",
"same breath life is death.mp3",
"whoru.mp3",
"Burden Hymns (Cinematic Alt-Country Cut).mp3",
"man matterv.mp3",
"LOOK AROUND (PSA).mp3",
"Sassy Sophie.mp3",
"prison burden1.mp3",
"Suzanne.mp3"
];

const songTitles = [
"2026",
"A Love",
"Same Breath",
"Who R U",
"Burden Hymns",
"Man Matter",
"Look Around",
"Sassy Sophie",
"Prison Burden",
"Suzanne"
];
let currentSong = 0;

const player = document.getElementById("player");
function playSong(index){
  currentSong = index;
  loadSong(index);
  player.play();
}
function loadSong(index){
    player.src = songs[index];

document.getElementById("songTitle").innerText =
songTitles[index];
}
function nextSong(){
  currentSong = (currentSong + 1) % songs.length;
  loadSong(currentSong);
  player.play();
}

function prevSong(){
  currentSong = (currentSong - 1 + songs.length) % songs.length;
  loadSong(currentSong);
  player.play();
}

player.addEventListener("ended", nextSong);
  loadSong(0); 
</script>
</body>
